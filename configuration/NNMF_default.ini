# =============================================================================
# NNMF_default.ini - Default config for 112x112 echonet-style data
# Stage 2: TO + TM (Threshold Only + Time-series Masking)
# =============================================================================

[Load_Save]
# --- Data Loading ---
load_raw_data = true
raw_data_folder = ../data/in/raw/echonet-lvh/

# --- Filtering (leave empty for all) ---
files_done: []
patients: []
classes: []
views: []

# --- Internal (do not change) ---
pickle_name = mitral_valve
save_dataset = false
load_dataset = false
load_echos_from_pickle = false

[Parameters]
fact_type = nnmf

# --- Training ---
n_steps = 5000
learning_rate = 0.0005
batch_size = 18000

# --- Network Architecture ---
mlp_size = 1
gmf_size = 2
mlp_layers: [10, 10, 1]
threshold_layers: [10, 10, 1]

# --- Loss Weights ---
l1_mult = 0.4
l21_mult = 0
embedding_mult = 0.1
spat_temp_mult = 0

# --- Initialization ---
embedding_nmf_init = true
gmf_net_init = false

# --- Data Path ---
data_folder = ../data/in/processed/echonet-lvh/

# --- Early Stopping (disabled) ---
train_test_split = 1
patience = 5
min_delta = 20
early_stopping = false

# --- Stage 2: Window Detection (TO + TM) ---
# option: None (threshold only) or optical_flow
option = None
time_series_masking = true
window_size: [0.20, 0.25]
search_window_size: [0.15, 0.20]
opt_flow_window_size = 0.15
threshold_wd = 99.9

# --- Stage 3: Valve Segmentation ---
connected_struct = true
morph_op = true
threshold_mv = 99

# --- Logging ---
num_workers = 6
save_data_every = 100
save_tensorboard_summary_every = 5

[Video_Processing]
# --- Processing Options (all disabled for raw avi input) ---
crop_meta_data = false
save_foreground = false
save_overlay = false
validate_cropping = false
save_cropped_video = false
resize = false
save_frames = false
verbose = true
side_length = 200
save_pickle_echo = true
